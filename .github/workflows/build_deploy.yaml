name: Build and Deploy to AWS

on:
  push:
    branches: [ "main" ]

jobs:
  build_deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: image-processor
      EKS_CLUSTER: image-processor-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make terraform.sh executable
        run: chmod +x .github/scripts/terraform.sh

      - name: Provision using Terraform
        run: |
          .github/scripts/terraform.sh init
          .github/scripts/terraform.sh "apply -auto-approve"

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and tag Docker image
        working-directory: worker
        run: |
          chmod +x build-docker-image.sh
          ./build-docker-image.sh $ECR_REPOSITORY $IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG
      
      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG
      
      - name: Update kubeconfig context
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
      
      - name: Create ServiceAccount and Deployment
        working-directory: k8Definitions
        run: |
          kubectl create -f service-account.yaml
          kubectl create -f deployment.yaml
      
      - name: Sleep for 15 seconds
        run: sleep 15s
        shell: bash

      - name: Output worker state
        run: kubectl get pods
      
     